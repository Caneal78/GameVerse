<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="192" fill="url(#grad1)"/>
  <g transform="translate(256, 192)">
    <!-- Game controller base -->
    <rect x="96" y="96" width="320" height="384" rx="64" fill="#1e1b4b"/>
    
    <!-- D-pad -->
    <rect x="144" y="192" width="64" height="64" rx="8" fill="#4f46e5"/>
    <rect x="112" y="224" width="64" height="64" rx="8" fill="#4f46e5"/>
    <rect x="144" y="256" width="64" height="64" rx="8" fill="#4f46e5"/>
    <rect x="176" y="224" width="64" height="64" rx="8" fill="#4f46e5"/>
    <rect x="144" y="224" width="64" height="64" rx="8" fill="#6366f1"/>
    
    <!-- Action buttons -->
    <circle cx="336" cy="224" r="24" fill="#4f46e5"/>
    <circle cx="304" cy="256" r="24" fill="#4f46e5"/>
    <circle cx="368" cy="256" r="24" fill="#4f46e5"/>
    <circle cx="336" cy="288" r="24" fill="#4f46e5"/>
    
    <!-- Start/Select -->
    <rect x="192" y="384" width="48" height="16" rx="8" fill="#4f46e5"/>
    <rect x="272" y="384" width="48" height="16" rx="8" fill="#4f46e5"/>
    
    <!-- GameVerse text -->
    <text x="256" y="480" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">GV</text>
  </g>
</svg>